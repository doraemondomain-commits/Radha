# ============================================================
# GitHub Actions — Auto WordPress Post Creator v18
#
# RANDOMIZED START TIME STRATEGY:
#   7 different cron schedules (one per weekday) spread across
#   6:00 AM – 9:30 AM IST. Python script adds another 0–30 min
#   random sleep on top, so effective range = 6:00 AM – 10:00 AM IST.
#
# IST = UTC + 5:30
#   Mon  →  6:00 AM IST  = 00:30 UTC
#   Tue  →  7:15 AM IST  = 01:45 UTC
#   Wed  →  8:00 AM IST  = 02:30 UTC
#   Thu  →  6:45 AM IST  = 01:15 UTC
#   Fri  →  9:00 AM IST  = 03:30 UTC
#   Sat  →  7:30 AM IST  = 02:00 UTC
#   Sun  →  8:45 AM IST  = 03:15 UTC
#
# Gap between posts is randomized inside auto_posts.py:
#   Options: 30, 45, 60, 75, 90, 105, 120 minutes
#
# Worst-case runtime = 30 min sleep + 120 min gap = ~2.5 hours
# timeout-minutes set to 200 to be safe.
# ============================================================

name: Auto WordPress Posts

on:
  schedule:
    - cron: "30 0 * * 1"   # Monday    → 6:00 AM IST
    - cron: "45 1 * * 2"   # Tuesday   → 7:15 AM IST
    - cron: "30 2 * * 3"   # Wednesday → 8:00 AM IST
    - cron: "15 1 * * 4"   # Thursday  → 6:45 AM IST
    - cron: "30 3 * * 5"   # Friday    → 9:00 AM IST
    - cron: "0 2 * * 6"    # Saturday  → 7:30 AM IST
    - cron: "15 3 * * 0"   # Sunday    → 8:45 AM IST

  # Manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      posts:
        description: "Number of posts to create"
        required: false
        default: "3"
      dry_run:
        description: "Dry run? (true/false)"
        required: false
        default: "false"
      skip_random_sleep:
        description: "Skip random startup sleep? (true/false) — set true for manual runs"
        required: false
        default: "true"

jobs:
  run-auto-posts:
    runs-on: ubuntu-latest
    timeout-minutes: 200   # 30 min sleep + 120 min gap + buffer

    steps:
      # ── 1. Checkout repo ───────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Setup Python ────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── 3. Install dependencies ────────────────────────────
      - name: Install dependencies
        run: |
          pip install requests

      # ── 4. Restore used_keywords.txt from cache ────────────
      - name: Restore used keywords cache
        uses: actions/cache@v4
        with:
          path: used_keywords.txt
          key: used-keywords-${{ github.run_id }}
          restore-keys: |
            used-keywords-

      # ── 5. Run the script ──────────────────────────────────
      - name: Run auto_posts.py
        env:
          WP_USERNAME:         ${{ secrets.WP_USERNAME }}
          WP_APP_PASSWORD:     ${{ secrets.WP_APP_PASSWORD }}
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          POSTS="${{ github.event.inputs.posts || '3' }}"
          DRY="${{ github.event.inputs.dry_run || 'false' }}"
          SKIP_SLEEP="${{ github.event.inputs.skip_random_sleep || 'false' }}"

          if [ "$DRY" = "true" ] && [ "$SKIP_SLEEP" = "true" ]; then
            python auto_posts.py --posts "$POSTS" --dry-run --skip-sleep
          elif [ "$DRY" = "true" ]; then
            python auto_posts.py --posts "$POSTS" --dry-run
          elif [ "$SKIP_SLEEP" = "true" ]; then
            python auto_posts.py --posts "$POSTS" --skip-sleep
          else
            python auto_posts.py --posts "$POSTS"
          fi

      # ── 6. Upload logs ─────────────────────────────────────
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: auto-posts-logs-${{ github.run_id }}
          path: logs/
          retention-days: 30

      # ── 7. Commit used_keywords.txt back to repo ───────────
      - name: Commit used_keywords.txt
        if: success()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add used_keywords.txt || true
          git diff --cached --quiet || git commit -m "chore: update used_keywords.txt [skip ci]"
          git push
